<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iAmobil — Inteligência Imobiliária</title>
    <style>
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* SPLASH */
      *{margin:0;padding:0;box-sizing:border-box;}
      #splash-overlay{position:fixed;inset:0;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;z-index:99999;cursor:pointer;transition:opacity .9s ease,transform .9s ease;font-family:'Segoe UI',system-ui,sans-serif;}
      #splash-overlay.hide{opacity:0;transform:scale(1.04);pointer-events:none;}
      .sp-badge{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:8px 20px;color:rgba(255,255,255,.5);font-size:11px;letter-spacing:3px;text-transform:uppercase;}
      .sp-dot{width:6px;height:6px;border-radius:50%;background:#a78bfa;animation:dotPulse 1.5s ease-in-out infinite;}
      @keyframes dotPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
      .sp-logo{display:flex;align-items:center;gap:16px;}
      .sp-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#a78bfa);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px rgba(167,139,250,.3),0 8px 32px rgba(124,58,237,.4);}
      .sp-brand{font-size:40px;font-weight:700;letter-spacing:-1.5px;color:#fff;line-height:1;}
      .sp-brand span{color:#a78bfa;}
      .sp-hint{color:rgba(255,255,255,.25);font-size:12px;letter-spacing:2px;text-transform:uppercase;animation:fadeInOut 2s ease-in-out infinite;}
      @keyframes fadeInOut{0%,100%{opacity:.2}50%{opacity:.7}}
      .sp-ring{position:absolute;border-radius:50%;border:1px solid rgba(167,139,250,.15);animation:ring 3.5s ease-out infinite;}
      @keyframes ring{from{width:80px;height:80px;opacity:.7}to{width:500px;height:500px;opacity:0}}
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "@google/genai": "https://esm.sh/@google/genai@^1.32.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.559.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- SPLASH SCREEN -->
    <div id="splash-overlay" onclick="dismissSplash()">
      <div class="sp-ring" style="animation-delay:0s"></div>
      <div class="sp-ring" style="animation-delay:1.2s"></div>
      <div class="sp-ring" style="animation-delay:2.4s"></div>
      <div class="sp-badge"><div class="sp-dot"></div>Plataforma Imobiliária</div>
      <div class="sp-logo">
        <div class="sp-icon">
          <svg width="32" height="32" viewBox="0 0 110 110" fill="none">
            <path d="M55 8 L100 48 L100 100 L10 100 L10 48 Z" fill="none" stroke="#fff" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" opacity=".9"/>
            <rect x="35" y="58" width="16" height="14" rx="3" fill="#fff" opacity=".9"/>
            <rect x="59" y="58" width="16" height="14" rx="3" fill="#fff" opacity=".9"/>
            <rect x="35" y="76" width="16" height="14" rx="3" fill="#fff" opacity=".9"/>
            <rect x="59" y="76" width="16" height="14" rx="3" fill="#fff" opacity=".9"/>
            <polygon points="55,1 62,11 48,11" fill="#fff"/>
          </svg>
        </div>
        <div class="sp-brand"><span>iA</span>mobil</div>
      </div>
      <div class="sp-hint">▶ clique para entrar</div>
    </div>

    <!-- APP REACT -->
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      function dismissSplash() {
        const splash = document.getElementById('splash-overlay');
        if (!splash) return;

        // Som de Startup / Transição
        const startup = new Audio('https://assets.mixkit.co/active_storage/sfx/2432/2432-preview.mp3');
        startup.volume = 0.4;
        startup.play().catch(e => console.log("Audio blocked", e));

        // Boas-vindas Vocal (IA Nativa)
        setTimeout(() => {
          const msg = new SpeechSynthesisUtterance();
          msg.text = "Bem-vindo ao iAmobil. Sua plataforma está pronta.";
          msg.lang = 'pt-BR';
          msg.rate = 0.9;
          msg.volume = 0.8;
          window.speechSynthesis.speak(msg);
        }, 600);


        splash.classList.add('hide');
        setTimeout(() => splash.remove(), 2000);
      }
      // Easter egg: Enter key tbm aciona o áudio
      document.addEventListener('keypress', e => {
        if (e.key === 'Enter') dismissSplash();
      });

    </script>
  </body>
</html>

services:
  - type: web
    name: iamobil-gestor-imobili-rio
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.cjs
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: PORT
        value: 10000
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_API_URL
        value: https://iamobil-gestor-imobili-rio.onrender.com
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        value: "YOUR_TELEGRAM_BOT_TOKEN_HERE"
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        value: https://iamobil-gestor-imobili-rio.onrender.com/api/telegram/webhook
        sync: false
      - key: NODE_ENV
        value: production
        sync: false
